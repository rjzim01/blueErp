<VirtualHost *:80>
   ServerName blueerp_v3
   DocumentRoot /var/www/html/public/

   <Directory /var/www/html>
       AllowOverride All
       Options Indexes FollowSymLinks
       Require all granted
   </Directory>
   
   <Directory />
       AllowOverride All
       Options -Indexes +FollowSymLinks
       Require all granted
   </Directory>
   
   ErrorLog ${APACHE_LOG_DIR}/error.log
   CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>